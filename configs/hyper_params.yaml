# configs/hyper_params.yaml

# Base Model configurations shared across all phases
model:
  base_model_path: "meta-llama/Llama-3.2-1B"
  max_seq_length: 1024

# Phase 1: Supervised Fine-Tuning (SFT)
sft:
  dataset_path: "allenai/tulu-3-sft-mixture" # Your target dataset
  output_dir: "./checkpoints/sft_llama_1b"
  
  # Hyperparameters
  num_epochs: 3
  batch_size: 4
  learning_rate: 2.0e-5  # Standard for 1B parameter SFT
  warmup_steps: 100
  logging_steps: 50
  
  # LoRA specific
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05

  load_full_dataset: false

# Phase 2: Reward Modeling (RM)
# RM requires predicting a scalar score for responses.
rm:
  dataset_path: "allenai/olmo-2-1b-preference" 
  output_dir: "./checkpoints/rm_llama_1b"
  
  # RM requires a smaller learning rate than SFT
  num_epochs: 1
  batch_size: 2
  learning_rate: 1.0e-5 
  warmup_steps: 50
  logging_steps: 50

  # LoRA specific
  lora_rank: 8      # Often smaller rank is enough for RM
  lora_alpha: 16
  lora_dropout: 0.1

# Phase 3: Preference Optimization (DPO / RLVR)
# Uses the SFT checkpoint as the starting point and the RM/Policy logic.
pref:
  dataset_path: "allenai/olmo-2-1b-preference" # Can swap to GSM8K synthetic pairs here
  base_sft_checkpoint: "./checkpoints/sft_llama_1b" # Initialize from Phase 1
  output_dir: "./checkpoints/dpo_llama_1b"
  
  # DPO requires an EXTREMELY small learning rate to avoid destroying the model
  num_epochs: 1
  batch_size: 2
  learning_rate: 5.0e-6 
  warmup_steps: 50
  logging_steps: 10
  
  # DPO Specific Parameters
  beta: 0.1
  
  # LoRA specific
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05